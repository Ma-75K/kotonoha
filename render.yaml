services:
  - type: web
    name: kotonoha-48o0
    runtime: docker
    plan: free
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kotonoha-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false  # これは手動で Render のダッシュボードから設定してください

databases:
  - name: kotonoha-db
    databaseName: kotonoha_production
    user: kotonoha_user
    plan: free
